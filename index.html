<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Touchdown Rush 🏈</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: #eee;
    }
    h1 { margin: 12px 0 4px; font-size: 22px; letter-spacing: 1px; }
    #game-container { margin-top: 8px; box-shadow: 0 0 24px rgba(0,0,0,.6); }
    .controls { font-size: 13px; color: #aaa; margin: 8px 0 16px; }
    .controls kbd {
      background: #333; border-radius: 4px; padding: 1px 6px;
      border: 1px solid #555; font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>🏈 TOUCHDOWN RUSH</h1>
  <div class="controls">
    <kbd>SPACE</kbd> hike &nbsp;·&nbsp; <kbd>←</kbd> <kbd>→</kbd> <kbd>↑</kbd> <kbd>↓</kbd> run &nbsp;·&nbsp;
    <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> pass to that receiver &nbsp;·&nbsp; 4 downs to go 10 yards!
  </div>
  <div id="game-container"></div>

  <!-- Phaser 3: the open-source game engine doing the heavy lifting -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
