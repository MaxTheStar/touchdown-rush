<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit + no user zoom = feels like a real iPad app, not a web page you can pinch -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <!-- "Add to Home Screen" opens the game FULL-SCREEN, with no Safari bars -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Touchdown Rush" />
  <title>Touchdown Rush 🏈</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;                 /* no page scrolling/bouncing on the iPad */
      background: #1a1a2e;
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: #eee;
      touch-action: none;               /* our buttons handle the touches, not the browser */
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      position: fixed;                  /* lock the page so iOS can't scroll/shift it */
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { margin: 8px 0 2px; font-size: 20px; letter-spacing: 1px; }

    /* keyboard hints — handy on a computer, hidden on a phone/iPad screen */
    .controls { font-size: 12px; color: #aaa; margin: 2px 0 6px; text-align: center; }
    .controls kbd {
      background: #333; border-radius: 4px; padding: 1px 6px;
      border: 1px solid #555; font-size: 11px;
    }
    /* On a phone/iPad, hide the title + hints so the field uses the whole screen */
    @media (max-width: 820px) { .controls, h1 { display: none; } }

    /* the game fills whatever space is left; Phaser scales the field to fit it */
    #game-container { flex: 1; width: 100%; min-height: 0; touch-action: none; }
    #game-container canvas { display: block; margin: 0 auto; touch-action: none; }

    /* ---- On-screen touch controls (the iPad buttons) ---- */
    .btn {
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.16);
      border: 2px solid rgba(255,255,255,0.45);
      border-radius: 14px;
      color: #fff;
      font: 800 20px/1 "Arial Black", Arial, sans-serif;
      box-shadow: 0 2px 8px rgba(0,0,0,.35);
    }
    .btn:active { background: rgba(255,255,255,0.42); transform: scale(0.94); }

    /* D-pad, bottom-left, in a plus shape */
    #dpad {
      position: fixed; z-index: 10;
      left: max(14px, env(safe-area-inset-left));
      bottom: max(20px, env(safe-area-inset-bottom));
      display: grid; grid-template-columns: repeat(3, 62px);
      grid-template-rows: repeat(3, 62px); gap: 6px;
    }
    #btn-up    { grid-column: 2; grid-row: 1; }
    #btn-left  { grid-column: 1; grid-row: 2; }
    #btn-right { grid-column: 3; grid-row: 2; }
    #btn-down  { grid-column: 2; grid-row: 3; }
    #dpad .btn { font-size: 26px; }

    /* action buttons, bottom-right */
    #actions {
      position: fixed; z-index: 10;
      right: max(14px, env(safe-area-inset-right));
      bottom: max(20px, env(safe-area-inset-bottom));
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    #pass-grid { display: grid; grid-template-columns: repeat(2, 62px); gap: 6px; }
    #pass-grid .btn { width: 62px; height: 52px; font-size: 18px; }
    #btn-snap {
      width: 130px; height: 56px; font-size: 22px;
      background: rgba(255,214,10,0.28);
      border-color: rgba(255,214,10,0.7);
    }
    #btn-snap:active { background: rgba(255,214,10,0.55); }

    /* Top-right buttons: Fullscreen (⛶) and the 1P/2P switch */
    #btn-fs, #btn-mode {
      position: fixed; z-index: 12;
      top: max(12px, env(safe-area-inset-top));
      width: 52px; height: 40px; font-size: 17px;
    }
    #btn-mode { right: max(12px, env(safe-area-inset-right)); }
    #btn-fs   { right: calc(max(12px, env(safe-area-inset-right)) + 60px); font-size: 22px; }

    /* Player 2's D-pad, top-center — hidden until 2-player mode is on */
    #dpad2 {
      position: fixed; left: 50%; transform: translateX(-50%); z-index: 10;
      top: max(10px, env(safe-area-inset-top));
      display: none;                         /* shown when body has .two-player */
      grid-template-columns: repeat(3, 54px);
      grid-template-rows: repeat(3, 54px); gap: 5px;
    }
    #btn2-up    { grid-column: 2; grid-row: 1; }
    #btn2-left  { grid-column: 1; grid-row: 2; }
    #btn2-right { grid-column: 3; grid-row: 2; }
    #btn2-down  { grid-column: 2; grid-row: 3; }
    #dpad2 .btn {
      font-size: 22px;
      background: rgba(216,58,58,0.30);       /* red-ish = the defense player */
      border-color: rgba(255,120,120,0.75);
    }
    body.two-player #dpad2 { display: grid; }

    /* ---- 4th-down choice panel (hidden until it's 4th down) ---- */
    #fourth-down {
      position: fixed; z-index: 30; inset: 0;
      display: none;                          /* main.js flips this to flex */
      flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; background: rgba(10,16,32,0.72);
    }
    #fourth-down .title {
      font: 800 26px "Arial Black", Arial; color: #ffe066;
      text-shadow: 0 2px 6px #000; letter-spacing: 1px;
    }
    #fourth-down .choice {
      -webkit-tap-highlight-color: transparent; touch-action: none;
      width: min(78vw, 300px); text-align: center;
      padding: 18px 16px; border-radius: 16px;
      font: 800 clamp(16px, 5.2vw, 22px) "Arial Black", Arial; color: #fff;
      background: rgba(255,255,255,0.16); border: 2px solid rgba(255,255,255,0.5);
      box-shadow: 0 3px 10px rgba(0,0,0,.4);
    }
    #btn-kick { background: rgba(255,214,10,0.28); border-color: rgba(255,214,10,0.75); }
    #fourth-down .choice:active { transform: scale(0.96); background: rgba(255,255,255,0.4); }
    #btn-kick:active { background: rgba(255,214,10,0.55); }

    /* While kicking, hide the football controls so the whole screen is one
       big "tap to kick" area (main.js adds/removes the .kicking class). */
    body.kicking #dpad,
    body.kicking #actions,
    body.kicking #dpad2,
    body.kicking #btn-mode,
    body.kicking #btn-fs { display: none !important; }

    /* While returning a kickoff you only RUN — hide the pass/handoff/HIKE
       buttons so they don't confuse you. The D-pad (and P2's D-pad in
       2-player) stay, since you drive the returner. (.returning class) */
    body.returning #actions { display: none !important; }

    /* ---- Choose-Your-Team menu buttons (◀ ▶ flip teams, PLAY starts) ----
       The team preview itself is drawn on the game canvas by main.js; these
       are real on-screen buttons so taps never miss on the iPad. Shown only
       while the body has the .menu class (main.js adds/removes it). */
    #team-menu { display: none; }
    body.menu #team-menu { display: block; }
    body.menu #dpad,
    body.menu #actions,
    body.menu #dpad2,
    body.menu #btn-mode,
    body.menu #btn-fs { display: none !important; }
    .tm-btn {
      -webkit-tap-highlight-color: transparent; touch-action: none;
      position: fixed; z-index: 40;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font: 800 30px "Arial Black", Arial;
      background: rgba(255,255,255,0.16); border: 2px solid rgba(255,255,255,0.5);
      border-radius: 16px; box-shadow: 0 3px 10px rgba(0,0,0,.4);
    }
    .tm-btn:active { transform: scale(0.94); background: rgba(255,255,255,0.4); }
    #tm-prev, #tm-next { top: 46%; width: 66px; height: 66px; }
    #tm-prev { left: max(16px, env(safe-area-inset-left)); }
    #tm-next { right: max(16px, env(safe-area-inset-right)); }
    #tm-play {
      left: 50%; transform: translateX(-50%);
      bottom: max(34px, env(safe-area-inset-bottom));
      width: min(72vw, 280px); height: 62px; font-size: 26px; letter-spacing: 1px;
      background: rgba(255,214,10,0.30); border-color: rgba(255,214,10,0.75);
    }
    #tm-play:active { transform: translateX(-50%) scale(0.96); background: rgba(255,214,10,0.6); }
  </style>
</head>
<body>
  <h1>🏈 TOUCHDOWN RUSH</h1>
  <div class="controls">
    <kbd>SPACE</kbd> hike &nbsp;·&nbsp; <kbd>←</kbd> <kbd>→</kbd> <kbd>↑</kbd> <kbd>↓</kbd> run &nbsp;·&nbsp;
    <kbd>1</kbd> <kbd>2</kbd> pass to WR &nbsp;·&nbsp; <kbd>3</kbd> pass to RB &nbsp;·&nbsp;
    <kbd>H</kbd> hand off &nbsp;·&nbsp; or use the buttons on screen!
  </div>
  <div id="game-container"></div>

  <!-- Choose-Your-Team menu buttons. The team preview is drawn on the canvas
       by main.js; these flip teams (◀ ▶) and start the game (PLAY). -->
  <div id="team-menu">
    <div class="tm-btn" id="tm-prev">◀</div>
    <div class="tm-btn" id="tm-next">▶</div>
    <div class="tm-btn" id="tm-play">PLAY ▶</div>
  </div>

  <!-- Fullscreen + 1P/2P switch (top-right) -->
  <div class="btn" id="btn-fs">⛶</div>
  <div class="btn" id="btn-mode">1P</div>

  <!-- 4th-down choice: play the down, or kick. main.js shows/hides this
       and fills in whether button ② is a FIELD GOAL or a PUNT. -->
  <div id="fourth-down">
    <div class="title">4TH DOWN!</div>
    <div class="choice" id="btn-go">① PLAY 4TH DOWN</div>
    <div class="choice" id="btn-kick">② FIELD GOAL</div>
  </div>

  <!-- Player 2's D-pad (top) — only shows in 2-player mode -->
  <div id="dpad2">
    <div class="btn" id="btn2-up">▲</div>
    <div class="btn" id="btn2-left">◀</div>
    <div class="btn" id="btn2-right">▶</div>
    <div class="btn" id="btn2-down">▼</div>
  </div>

  <!-- The finger buttons. main.js wires each one to the game. -->
  <div id="dpad">
    <div class="btn" id="btn-up">▲</div>
    <div class="btn" id="btn-left">◀</div>
    <div class="btn" id="btn-right">▶</div>
    <div class="btn" id="btn-down">▼</div>
  </div>
  <div id="actions">
    <div id="pass-grid">
      <div class="btn" id="btn-1">1</div>
      <div class="btn" id="btn-2">2</div>
      <div class="btn" id="btn-3">3</div>
      <div class="btn" id="btn-hand">HAND</div>
    </div>
    <div class="btn" id="btn-snap">HIKE</div>
  </div>

  <!-- Phaser 3: the open-source game engine doing the heavy lifting -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>
  <!-- kick.js must load BEFORE main.js: it defines KickGame, which main.js uses -->
  <script src="src/kick.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
